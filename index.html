<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ChainStreak — Daily Check-In</title>

  <meta name="fc:frame" content='{
    "version":"next",
    "imageUrl":"https://chainstreak.vercel.app/og.png",
    "button":{
      "title":"🔥 Start My Streak",
      "action":{
        "type":"launch_frame",
        "name":"ChainStreak",
        "url":"https://chainstreak.vercel.app",
        "splashImageUrl":"https://chainstreak.vercel.app/splash.png",
        "splashBackgroundColor":"#04080f"
      }
    }
  }'/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #04080f;
      --card: #0a1520;
      --cyan: #00c8ff;
      --orange: #ff6b2b;
      --text: #e8f4ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Outfit', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    #app {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--cyan);
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(0,200,255,0.1);
      border-radius: 15px;
      padding: 20px;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--cyan);
      overflow: hidden;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .btn-checkin {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--orange), #ff9500);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-checkin:disabled { opacity: 0.5; cursor: not-allowed; }

    .ref-link {
      font-size: 11px;
      color: var(--cyan);
      background: rgba(0,200,255,0.05);
      padding: 10px;
      border-radius: 8px;
      word-break: break-all;
    }

    #state-loading { text-align: center; margin-top: 50px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
  </style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <span class="brand-name">CHAINSTREAK</span>
    <span style="font-size:12px; color:var(--orange)">BASE MAINNET</span>
  </div>

  <div id="state-loading">INITIALIZING FRAME...</div>

  <div id="state-main" style="display:none;">
    <div class="card">
      <div class="user-row">
        <div class="avatar" id="user-avatar"></div>
        <div>
          <div id="user-name" style="font-weight:700">User</div>
          <div id="user-fid" style="font-size:12px; opacity:0.6">FID: 0</div>
        </div>
      </div>
      <div style="text-align:center; padding: 10px 0;">
         <span style="font-size:14px">Current Streak</span>
         <div id="streak-count" style="font-family:'Bebas Neue', sans-serif; font-size:48px; color:var(--orange)">0</div>
      </div>
    </div>

    <button class="btn-checkin" id="btn-checkin" onclick="handleCheckin()">🔥 CHECK IN NOW</button>
    <p id="status" style="font-size:12px; text-align:center; margin-top:10px;"></p>

    <div class="card" style="margin-top:15px;">
      <div style="font-size:12px; margin-bottom:8px;">SHARE & EARN REWARDS</div>
      <div id="ref-link" class="ref-link">https://chainstreak.vercel.app</div>
    </div>
  </div>
</div>

<script type="module">
  import sdk from 'https://esm.sh/@farcaster/frame-sdk';

  const CONFIG = {
    TREASURY: "0xb55ab0302Db8C8827fcBDE7F2CF33C40a7783784",
    APP_URL: "https://chainstreak.vercel.app",
    FEE: "0.000025",
    CHAIN_ID: "0x2105"
  };

  async function start() {
    try {
      const context = await sdk.context;
      
      if (context?.user) {
        document.getElementById('user-name').textContent = context.user.displayName || 'User';
        document.getElementById('user-fid').textContent = `FID: ${context.user.fid}`;
        if (context.user.pfpUrl) {
          document.getElementById('user-avatar').innerHTML = `<img src="${context.user.pfpUrl}">`;
        }
        document.getElementById('ref-link').textContent = `${CONFIG.APP_URL}?ref=${context.user.fid}`;
      }

      document.getElementById('state-loading').style.display = 'none';
      document.getElementById('state-main').style.display = 'block';
      sdk.actions.ready();
    } catch (e) {
      document.getElementById('state-loading').textContent = "Please open in Warpcast";
    }
  }

  window.handleCheckin = async function() {
    const status = document.getElementById('status');
    const btn = document.getElementById('btn-checkin');
    btn.disabled = true;
    status.textContent = "Connecting...";

    try {
      const provider = sdk.wallet.ethProvider;
      const accounts = await provider.request({ method: 'eth_requestAccounts' });
      
      const tx = await provider.request({
        method: 'eth_sendTransaction',
        params: [{
          from: accounts[0],
          to: CONFIG.TREASURY,
          value: '0x' + (Number(CONFIG.FEE) * 1e18).toString(16),
          chainId: CONFIG.CHAIN_ID
        }]
      });
      status.textContent = "✅ Success!";
      btn.textContent = "STREAK UPDATED";
    } catch (e) {
      btn.disabled = false;
      status.textContent = "Error: " + e.message;
    }
  };

  start();
</script>
</body>
</html>
