<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>ChainStreak — Daily Check-In</title>

  <!-- ✅ UPDATED FRAME -->
  <meta name="fc:frame" content='{
    "version":"next",
    "imageUrl":"https://chainstreak.vercel.app/og.png",
    "button":{
      "title":"🔥 Start My Streak",
      "action":{
        "type":"launch_frame",
        "name":"ChainStreak",
        "url":"https://chainstreak.vercel.app",
        "splashImageUrl":"https://chainstreak.vercel.app/splash.png",
        "splashBackgroundColor":"#04080f"
      }
    }
  }'/>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      margin:0;
      font-family:'Outfit',sans-serif;
      background:#04080f;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }
    .box {
      text-align:center;
      padding:30px;
      border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;
      background:#0a1520;
    }
    button {
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#ff6b2b;
      color:#fff;
      cursor:pointer;
      margin-top:15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🔥 ChainStreak</h1>
  <p>Daily Check-in System</p>

  <button onclick="checkin()">CHECK IN</button>

  <p id="status"></p>
</div>

<script>
const CONFIG = {
  APP_URL: "https://chainstreak.vercel.app"
};

function checkin(){
  document.getElementById("status").innerText = "✅ Checked in successfully!";
}

function share(){
  const ref = CONFIG.APP_URL;
  const text = "Join ChainStreak 👇 " + ref;
  window.open("https://warpcast.com/~/compose?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
