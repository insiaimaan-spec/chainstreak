<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>ChainStreak — Daily Check-In</title>

  <meta name="fc:frame" content='{
    "version":"next",
    "imageUrl":"https://chanstreak.netlify.app/og.png",
    "button":{
      "title":"🔥 Start My Streak",
      "action":{
        "type":"launch_frame",
        "name":"ChainStreak",
        "url":"https://chanstreak.netlify.app",
        "splashImageUrl":"https://chanstreak.netlify.app/splash.png",
        "splashBackgroundColor":"#04080f"
      }
    }
  }'/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:       #04080f;
      --surface:  #080f1a;
      --card:     #0a1520;
      --border:   rgba(0,200,255,0.12);
      --border2:  rgba(0,200,255,0.06);
      --cyan:     #00c8ff;
      --orange:   #ff6b2b;
      --gold:     #ffd166;
      --green:    #00e5a0;
      --red:      #ff4560;
      --text:     #e8f4ff;
      --text2:    #7a9ab8;
      --text3:    #3a5068;
      --r:        16px;
      --rs:       10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); }
    body { font-family: 'Outfit', sans-serif; display: flex; align-items: flex-start; justify-content: center; -webkit-font-smoothing: antialiased; }

    /* Background Grids */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(0,200,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,.03) 1px, transparent 1px);
      background-size: 32px 32px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,200,255,.12) 0%, transparent 65%), radial-gradient(ellipse 40% 30% at 100% 80%, rgba(255,107,43,.08) 0%, transparent 55%);
      pointer-events: none;
    }

    #app { position: relative; z-index: 1; width: 100%; max-width: 400px; min-height: 100vh; display: flex; flex-direction: column; animation: boot .4s ease both; }
    @keyframes boot { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* Fix for the giant logo bug */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border2); background: rgba(4,8,15,.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 10; }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-mark { width: 32px !important; height: 32px !important; border-radius: 10px; background: linear-gradient(135deg, #ff6b2b, #ff9500); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 16px rgba(255,107,43,.5); flex-shrink: 0; }
    .brand-mark svg { width: 18px !important; height: 18px !important; display: block; }
    .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; background: linear-gradient(90deg, var(--cyan), var(--text)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .chain-pill { display: flex; align-items: center; gap: 6px; background: rgba(0,82,255,.1); border: 1px solid rgba(0,82,255,.25); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 600; color: #6b9fff; font-family: 'JetBrains Mono', monospace; }
    .chain-logo { width: 18px; height: 18px; border-radius: 50%; background: #0052ff; display: flex; align-items: center; justify-content: center; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .pool-banner { background: linear-gradient(135deg, rgba(255,107,43,.1), rgba(255,209,102,.08)); border: 1px solid rgba(255,107,43,.25); border-radius: var(--r); padding: 16px; position: relative; overflow: hidden; }
    .pool-amount { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); }
    .pool-label { font-size: 10px; font-weight: 600; color: var(--orange); text-transform: uppercase; }

    .user-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--cyan); display: flex; align-items: center; justify-content: center; border: 2px solid rgba(0,200,255,.3); overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .streak-badge { background: rgba(255,107,43,.1); border: 1px solid rgba(255,107,43,.25); border-radius: 10px; padding: 8px; text-align: center; min-width: 65px; }
    .streak-num { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--orange); line-height: 1; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-box { background: var(--card); border: 1px solid var(--border2); border-radius: var(--rs); padding: 10px; text-align: center; }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
    .stat-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; margin-top: 4px; }

    .checkin-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; text-align: center; }
    .btn-checkin { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--orange), #ff9500); border: none; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #fff; cursor: pointer; box-shadow: 0 4px 24px rgba(255,107,43,.4); }
    .btn-checkin:disabled { background: #2a3040; color: var(--text3); box-shadow: none; cursor: not-allowed; }

    .status { padding: 11px; border-radius: 10px; font-size: 12px; font-family: 'JetBrains Mono', monospace; margin-top: 10px; display: none; }
    .status.show { display: block; }
    .status.ok { background: rgba(0,229,160,.1); color: var(--green); }
    .status.err { background: rgba(255,69,96,.1); color: var(--red); }
    
    .ref-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
    .ref-link-box { background: rgba(0,200,255,.05); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--cyan); overflow: hidden; text-overflow: ellipsis; }
    .btn-copy { padding: 10px; background: rgba(0,200,255,.1); border: 1px solid var(--border); border-radius: 8px; color: var(--cyan); font-size: 12px; cursor: pointer; }

    .lb-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .lb-row { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border2); }
    .lb-rank { font-family: 'Bebas Neue', sans-serif; width: 25px; text-align: center; }

    #state-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
    .loader { width: 36px; height: 36px; border: 3px solid rgba(0,200,255,.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #state-main { display: none; }
    .footer { text-align: center; padding: 20px; font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="white"><path d="M13 2L4.5 13.5H11L10 22L20.5 9.5H14L13 2Z"/></svg>
      </div>
      <span class="brand-name">ChainStreak</span>
    </div>
    <div class="chain-pill">
      <div class="chain-logo"><svg viewBox="0 0 24 24" fill="white" width="10"><circle cx="12" cy="12" r="10" fill="#0052ff"/><path d="M12 5C8.13 5 5 8.13 5 12s3.13 7 7 7c3.44 0 6.32-2.48 6.88-5.75H12V10.5h8.93c.05.49.07.98.07 1.5 0 4.97-4.03 9-9 9S3 16.97 3 12 7.03 3 12 3c2.27 0 4.35.84 5.93 2.22l-2.13 2.13C14.77 6.3 13.46 5.75 12 5z" fill="white"/></svg></div>
      Base
    </div>
  </div>

  <div id="state-loading"><div class="loader"></div><span>Syncing Streak...</span></div>

  <div id="state-main">
    <div class="body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="pool-banner">
          <div class="pool-label">🏆 Referral Pool</div>
          <div class="pool-amount">$50K</div>
        </div>
        <div class="pool-banner" style="border-color:var(--cyan)">
          <div class="pool-label" style="color:var(--cyan)">🌊 User Pool</div>
          <div class="pool-amount" style="color:var(--cyan)">$350K</div>
        </div>
      </div>

      <div class="user-card">
        <div class="avatar" id="user-avatar">👤</div>
        <div style="flex:1">
          <div class="user-name" id="user-name">User</div>
          <div style="font-size:11px;color:var(--text3)" id="user-fid">FID: 0</div>
        </div>
        <div class="streak-badge">
          <div class="streak-num" id="streak-count">0</div>
          <div style="font-size:9px;color:var(--text2)">🔥 STREAK</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">Check-ins</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-refs">0</div><div class="stat-lbl">Referrals</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-rank">#--</div><div class="stat-lbl">Rank</div></div>
      </div>

      <div class="checkin-wrap">
        <button class="btn-checkin" id="btn-checkin" onclick="handleCheckin()">🔥 CHECK IN NOW</button>
        <div class="status" id="checkin-status"></div>
      </div>

      <div class="ref-card">
        <div style="font-size:12px;margin-bottom:8px">🚀 Your Referral Link</div>
        <div style="display:flex;gap:8px">
          <div class="ref-link-box" id="ref-link">...</div>
          <button class="btn-copy" onclick="copyRef()">Copy</button>
        </div>
      </div>
    </div>
    <div class="footer">ChainStreak · $500K Pool · Built on Base</div>
  </div>
</div>

<script type="module">
const CONFIG = {
  NEYNAR_API_KEY: "DE8E47D8-9F62-4C74-B461-19D61C82E51F",
  TREASURY: "0xb55ab0302Db8C8827fcBDE7F2CF33C40a7783784",
  APP_URL: "https://chanstreak.netlify.app", // Updated to Netlify
  FEE_ETH: 0.000025,
  CHAIN_ID: "0x2105"
};

async function init() {
  const sdkMod = await import('https://esm.sh/@farcaster/frame-sdk').catch(()=>({}));
  const sdk = sdkMod.default || sdkMod;

  let ctx;
  try { ctx = await sdk.context; } catch(e) {}

  if (!ctx?.user?.fid) {
    document.getElementById('state-loading').innerHTML = "Please open in Warpcast";
    return;
  }

  const { fid, displayName, pfpUrl } = ctx.user;
  document.getElementById('user-name').textContent = displayName || 'User';
  document.getElementById('user-fid').textContent = `FID: ${fid}`;
  if(pfpUrl) document.getElementById('user-avatar').innerHTML = `<img src="${pfpUrl}">`;
  
  document.getElementById('ref-link').textContent = `${CONFIG.APP_URL}?ref=${fid}`;
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-main').style.display = 'block';

  window._cs = { fid, sdk };
  try { sdk?.actions?.ready?.(); } catch(e) {}
}

window.copyRef = function() {
  navigator.clipboard.writeText(document.getElementById('ref-link').textContent);
  alert("Copied!");
};

window.handleCheckin = async function() {
  const btn = document.getElementById('btn-checkin');
  const status = document.getElementById('checkin-status');
  btn.disabled = true;
  status.className = "status show ok";
  status.textContent = "Connecting wallet...";

  try {
    const sdk = window._cs.sdk;
    const provider = sdk.wallet.ethProvider;
    const accounts = await provider.request({ method: 'eth_requestAccounts' });
    
    const wei = BigInt(Math.round(CONFIG.FEE_ETH * 1e18));
    await provider.request({
      method: 'eth_sendTransaction',
      params: [{
        from: accounts[0],
        to: CONFIG.TREASURY,
        value: '0x' + wei.toString(16),
        gas: '0x5208'
      }]
    });

    status.textContent = "✅ Success!";
  } catch(e) {
    btn.disabled = false;
    status.className = "status show err";
    status.textContent = "Error: " + e.message;
  }
};

init();
</script>
</body>
</html>
